<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت تیکت‌های کاربران</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <style>
        body { background: #f8f9fa; font-family: Vazirmatn, Tahoma, sans-serif; }
        .ticket-container { max-width: 1100px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px #0001; padding: 30px; }
        .ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .ticket-header h2 { font-size: 1.5rem; margin: 0; }
        .ticket-list { border-left: 1px solid #eee; min-height: 400px; }
        .ticket-list-item { padding: 15px 10px; border-bottom: 1px solid #f1f1f1; cursor: pointer; transition: background 0.2s; }
        .ticket-list-item.active, .ticket-list-item:hover { background: #f5f5f5; }
        .ticket-list-item .status { font-size: 12px; border-radius: 8px; padding: 2px 8px; margin-right: 8px; }
        .status-open { background: #d4edda; color: #155724; }
        .status-closed { background: #f8d7da; color: #721c24; }
        .ticket-messages { max-height: 400px; overflow-y: auto; padding: 10px 0; }
        .message { margin-bottom: 18px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.admin { align-items: flex-start; }
        .message-content { background: #f1f1f1; border-radius: 10px; padding: 10px 16px; max-width: 70%; }
        .message.user .message-content { background: #9a563a; color: #fff; }
        .message.admin .message-content { background: #f1f1f1; color: #333; }
        .message-time { font-size: 11px; color: #888; margin-top: 4px; }
        .ticket-details { margin-bottom: 10px; }
        .admin-reply-form { background: #f9f9f9; border-radius: 10px; padding: 20px; margin-top: 20px; }
        @media (max-width: 991px) {
            .ticket-container { padding: 10px; }
            .ticket-header { flex-direction: column; gap: 10px; }
            .ticket-list { border-left: none; border-top: 1px solid #eee; margin-top: 20px; }
        }
        @media (max-width: 768px) {
            .ticket-container { padding: 2px; }
            .ticket-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="ticket-container">
        <div class="ticket-header">
            <h2>مدیریت تیکت‌های کاربران</h2>
            <a href="admin.html" class="btn btn-secondary">بازگشت به داشبورد</a>
        </div>
        <!-- فیلتر و جستجو -->
        <div class="row mb-3">
            <div class="col-md-3 mb-2">
                <select id="userTypeFilter" class="form-select">
                    <option value="all">همه کاربران</option>
                    <option value="مشتری">مشتری</option>
                    <option value="مدیر سالن">مدیر سالن</option>
                </select>
            </div>
            <div class="col-md-5 mb-2">
                <input type="text" id="searchInput" class="form-control" placeholder="جستجو بر اساس عنوان، نام کاربر یا دسته‌بندی...">
            </div>
            <div class="col-md-4 text-end text-md-start">
                <span id="ticketCountInfo" class="text-muted"></span>
            </div>
        </div>
        <div class="row mt-4">
            <!-- لیست تیکت‌ها -->
            <div class="col-md-4">
                <div class="ticket-list" id="ticketList">
                    <!-- تیکت‌ها به صورت داینامیک اضافه می‌شوند -->
                </div>
            </div>
            <!-- نمایش مکالمه تیکت -->
            <div class="col-md-8">
                <div id="ticketDetails" style="display:none;">
                    <div class="ticket-details mb-2">
                        <strong>عنوان:</strong> <span id="detailTitle"></span><br>
                        <strong>دسته‌بندی:</strong> <span id="detailCategory"></span><br>
                        <strong>نام کاربر:</strong> <span id="detailUserName"></span><br>
                        <strong>نوع کاربر:</strong> <span id="detailUserType"></span><br>
                        <strong>وضعیت:</strong> <span id="detailStatus" class="status"></span>
                    </div>
                    <!-- یادداشت داخلی ادمین -->
                    <div class="mb-2">
                        <label for="adminNoteInput" class="form-label">یادداشت داخلی ادمین (فقط برای ادمین):</label>
                        <textarea id="adminNoteInput" class="form-control" rows="2" placeholder="یادداشت..." onchange="saveAdminNote()"></textarea>
                    </div>
                    <div class="ticket-messages" id="ticketMessages"></div>
                    <form id="adminReplyForm" class="admin-reply-form">
                        <div class="mb-2">
                            <textarea class="form-control" id="adminReplyMessage" rows="3" placeholder="پاسخ ادمین..." required></textarea>
                        </div>
                        <div class="mb-2">
                            <input type="file" class="form-control" id="adminReplyFile" accept="image/*,.pdf,.doc,.docx">
                        </div>
                        <button type="submit" class="btn btn-success">ارسال پاسخ ادمین</button>
                        <button type="button" class="btn btn-danger ms-2" id="closeTicketBtn">بستن تیکت</button>
                        <button type="button" class="btn btn-info ms-2" id="openTicketBtn">باز کردن تیکت</button>
                    </form>
                </div>
                <div id="noTicketSelected" class="text-center text-muted" style="margin-top:100px;">
                    <i class="fas fa-ticket-alt fa-3x mb-3"></i>
                    <div>برای مشاهده مکالمه، یک تیکت را انتخاب کنید.</div>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/fontawesome.min.js"></script>
    <script>
    // داده‌های نمونه تیکت‌ها (در عمل باید از سرور خوانده شود)
    let tickets = [
        {
            id: 1,
            title: 'مشکل در رزرو نوبت',
            category: 'رزرو و نوبت',
            status: 'باز',
            userType: 'مشتری',
            userName: 'علی رضایی',
            adminNote: '',
            messages: [
                { sender: 'user', text: 'سلام، هنگام رزرو خطا دریافت می‌کنم.', time: '1403/02/01 - 10:15' },
                { sender: 'admin', text: 'سلام، لطفا خطا را دقیق‌تر توضیح دهید.', time: '1403/02/01 - 10:30' }
            ]
        },
        {
            id: 2,
            title: 'سوال درباره پرداخت',
            category: 'مالی',
            status: 'بسته',
            userType: 'مدیر سالن',
            userName: 'مریم محمدی',
            adminNote: 'بررسی مجدد لازم است.',
            messages: [
                { sender: 'user', text: 'پرداخت من ثبت نشده است.', time: '1403/01/28 - 09:00' },
                { sender: 'admin', text: 'بررسی شد، پرداخت شما تایید شد.', time: '1403/01/28 - 09:30' }
            ]
        }
    ];
    let currentTicketId = null;
    let filteredTickets = tickets.slice();

    function renderTicketList() {
        const list = document.getElementById('ticketList');
        list.innerHTML = '';
        if (filteredTickets.length === 0) {
            list.innerHTML = '<div class="text-center text-muted mt-4">تیکتی ثبت نشده است.</div>';
            document.getElementById('ticketCountInfo').textContent = '';
            return;
        }
        filteredTickets.forEach(ticket => {
            const item = document.createElement('div');
            item.className = 'ticket-list-item' + (ticket.id === currentTicketId ? ' active' : '');
            item.innerHTML = `
                <div><strong>${ticket.title}</strong></div>
                <div class="text-muted small">${ticket.category} | ${ticket.userName} (${ticket.userType})</div>
                <span class="status ${ticket.status === 'باز' ? 'status-open' : 'status-closed'}">${ticket.status}</span>
            `;
            item.onclick = () => selectTicket(ticket.id);
            list.appendChild(item);
        });
        // نمایش تعداد
        const openCount = filteredTickets.filter(t => t.status === 'باز').length;
        const closedCount = filteredTickets.filter(t => t.status === 'بسته').length;
        document.getElementById('ticketCountInfo').textContent = `باز: ${openCount} | بسته: ${closedCount} | مجموع: ${filteredTickets.length}`;
    }

    function selectTicket(id) {
        currentTicketId = id;
        renderTicketList();
        const ticket = tickets.find(t => t.id === id);
        if (!ticket) return;
        document.getElementById('ticketDetails').style.display = '';
        document.getElementById('noTicketSelected').style.display = 'none';
        document.getElementById('detailTitle').textContent = ticket.title;
        document.getElementById('detailCategory').textContent = ticket.category;
        document.getElementById('detailStatus').textContent = ticket.status;
        document.getElementById('detailStatus').className = 'status ' + (ticket.status === 'باز' ? 'status-open' : 'status-closed');
        document.getElementById('detailUserName').textContent = ticket.userName;
        document.getElementById('detailUserType').textContent = ticket.userType;
        document.getElementById('adminNoteInput').value = ticket.adminNote || '';
        renderMessages(ticket);
        document.getElementById('adminReplyForm').style.display = ticket.status === 'باز' ? '' : '';
        document.getElementById('closeTicketBtn').style.display = ticket.status === 'باز' ? '' : 'none';
        document.getElementById('openTicketBtn').style.display = ticket.status === 'بسته' ? '' : 'none';
    }

    function renderMessages(ticket) {
        const box = document.getElementById('ticketMessages');
        box.innerHTML = '';
        ticket.messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (msg.sender === 'user' ? 'user' : 'admin');
            msgDiv.innerHTML = `
                <div class="message-content">${msg.text}</div>
                <div class="message-time">${msg.time}</div>
            `;
            box.appendChild(msgDiv);
        });
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('adminReplyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = document.getElementById('adminReplyMessage').value.trim();
        if (!msg) return;
        const ticket = tickets.find(t => t.id === currentTicketId);
        if (!ticket) return;
        ticket.messages.push({ sender: 'admin', text: msg, time: new Date().toLocaleString('fa-IR') });
        renderMessages(ticket);
        this.reset();
    });

    document.getElementById('closeTicketBtn').addEventListener('click', function() {
        const ticket = tickets.find(t => t.id === currentTicketId);
        if (!ticket) return;
        if (confirm('آیا مطمئن هستید که می‌خواهید این تیکت را ببندید؟')) {
            ticket.status = 'بسته';
            renderTicketList();
            selectTicket(ticket.id);
        }
    });
    document.getElementById('openTicketBtn').addEventListener('click', function() {
        const ticket = tickets.find(t => t.id === currentTicketId);
        if (!ticket) return;
        ticket.status = 'باز';
        renderTicketList();
        selectTicket(ticket.id);
    });

    // فیلتر و جستجو
    document.getElementById('userTypeFilter').addEventListener('change', filterAndSearchTickets);
    document.getElementById('searchInput').addEventListener('input', filterAndSearchTickets);
    function filterAndSearchTickets() {
        const type = document.getElementById('userTypeFilter').value;
        const search = document.getElementById('searchInput').value.trim();
        filteredTickets = tickets.filter(t => {
            let matchType = (type === 'all') || (t.userType === type);
            let matchSearch = !search || (
                t.title.includes(search) ||
                t.category.includes(search) ||
                t.userName.includes(search)
            );
            return matchType && matchSearch;
        });
        renderTicketList();
        document.getElementById('ticketDetails').style.display = 'none';
        document.getElementById('noTicketSelected').style.display = '';
    }

    // ذخیره یادداشت ادمین
    function saveAdminNote() {
        const ticket = tickets.find(t => t.id === currentTicketId);
        if (!ticket) return;
        ticket.adminNote = document.getElementById('adminNoteInput').value;
    }

    // بارگذاری اولیه
    renderTicketList();
    if (tickets.length > 0) selectTicket(tickets[0].id);
    </script>
</body>
</html>
