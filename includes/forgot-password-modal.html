<div class="modal" id="forgotPasswordModal" role="dialog" aria-labelledby="forgotPasswordModalTitle" aria-hidden="true">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()" aria-label="بستن مدال">&times;</button>
        <div class="auth-form">
            <h2 id="forgotPasswordModalTitle">بازیابی رمز عبور</h2>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="phone-number">شماره تلفن همراه</label>
                    <input type="tel" id="phone-number" name="phone-number" required aria-required="true" placeholder="09xxxxxxxxx">
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> ارسال کد بازیابی
                </button>
            </form>
            <div class="form-footer">
                <p>به یاد آوردید؟ <a href="login-modal.html" class="login-link" onclick="openModal('login'); return false;">ورود به حساب کاربری</a></p>
            </div>
        </div>
    </div>
</div>
